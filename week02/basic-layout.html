<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basic HTML Structure</title>

    <meta name="description" content="A basic HTML structure example using semantic HTML elements">

    <meta name="Author" content="Collins Zivanai">
</head>

<body>
    <header>

    </header>
    <nav>
        <header>
            <h1>My Home Page</h1>
        </header>

        <nav>
            <ul>
                <li>
                    <a href="https://www.google.com" target="_blank">
                        Google
                    </a>
                </li>

                <li>
                    <a href="https://www.wikipedia.org" target="_blank">
                        Wikipedia
                    </a>
                </li>
            </ul>
        </nav>

    </nav>
    <main>
        <h1>"Basic HTML Structures"</h1>
        <img src="images/basic-logo.png" width="128" height="128" alt="Desktop">
        <section>
            <h2>Heading One</h2>
            <p>
                This is the first paragraph inside the first section.
            </p>
        </section>

        <section>
            <h2>Heading Two</h2>
            <p>
                This is the second paragraph inside the second section element.
            </p>
        </section>

    </main>
    <aside>
        <img src="https://www.churchofjesuschrist.org/temples/photo-gallery?lang=eng"
          alt="Ghana temple" width="200">
    </aside>
    <footer>
        <p>
            Collins Zivanai
        </p>
    </footer>
</body>

</html>
